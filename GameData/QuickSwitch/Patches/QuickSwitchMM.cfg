// QuickSwitch Module Manager patch
// Injects QuickSwitchModule into command-capable parts AND Kerbal EVAs.
//
// Patch 1: All parts with ModuleCommand (pods, probe cores, landers, rovers, etc.)
// Patch 2: Kerbals on EVA (kerbalEVA has no ModuleCommand per se, so it needs its own entry)
//
// Since kerbalEVA lacks ModuleCommand, there is zero overlap between these two patches —
// each part gets exactly one QuickSwitchModule → one "Switch To" button.
//
// Gated by :NEEDS so the module is only added when QuickSwitch.dll is present.
//
// IMPORTANT: After changing this file, delete ModuleManager's cache before launching KSP:
//   GameData/ModuleManager.ConfigCache
//   GameData/ModuleManager.ConfigSHA
//   GameData/ModuleManager/  (entire folder)

@PART[*]:HAS[@MODULE[ModuleCommand]]:NEEDS[QuickSwitch]:FOR[QuickSwitch]
{
    MODULE
    {
        name = QuickSwitchModule
    }
}

@PART[kerbalEVA*]:NEEDS[QuickSwitch]:FOR[QuickSwitch]
{
    MODULE
    {
        name = QuickSwitchModule
    }
}