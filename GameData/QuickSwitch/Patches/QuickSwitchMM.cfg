// QuickSwitch Module Manager patch
// Injects QuickSwitchModule into ALL parts so you can right-click any part
// of a nearby vessel and click "Switch To" to take control of that vessel.
//
// This wildcard @PART[*] covers everything: command pods, fuel tanks, engines,
// structural parts, and kerbalEVA — with no overlap since MM applies the patch
// once per matching part.
//
// Gated by :NEEDS so the module is only added when QuickSwitch.dll is present.
//
// IMPORTANT: After changing this file, delete ModuleManager's cache before launching KSP:
//   GameData/ModuleManager.ConfigCache
//   GameData/ModuleManager.ConfigSHA
//   GameData/ModuleManager/  (entire folder)

@PART[*]:NEEDS[QuickSwitch]:FOR[QuickSwitch]
{
    MODULE
    {
        name = QuickSwitchModule
    }
}
